<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla Fonts CDN - By Faysal</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style id="dynamic-fonts"></style> 
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            padding: 60px 20px;
            text-align: center;
        }

        header {
            margin-bottom: 50px;
        }

        h1 {
            font-weight: 800;
            font-size: 3.2rem;
            margin: 0;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .font-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        /* Modern Card Design */
        .font-card {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.8);
            position: relative;
            overflow: hidden;
        }

        .font-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }

        /* Cloud Download Icon */
        .top-download-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: var(--primary-light);
            color: var(--primary);
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }

        .top-download-btn:hover {
            background: var(--primary);
            color: white;
            transform: rotate(-10deg) scale(1.1);
        }

        .font-name {
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--text-main);
            margin-bottom: 25px;
            display: block;
        }

        .preview-box {
            background: #f1f5f9;
            padding: 30px 20px;
            border-radius: 18px;
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        .font-card:hover .preview-box {
            background: #ffffff;
        }

        .font-preview {
            font-size: 2.4rem;
            width: 100%;
            text-align: center;
            color: #0f172a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Modern Copy Button */
        .copy-btn {
            width: 100%;
            border: none;
            background: #1e293b;
            color: white;
            padding: 14px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .copy-btn:hover {
            background: var(--primary);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4);
        }

        .copy-btn i {
            font-size: 1rem;
        }

        footer {
            margin-top: 80px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        footer b {
            color: var(--text-main);
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        /* Animation for Grid */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .font-card {
            animation: fadeIn 0.6s ease forwards;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Bangla Fonts CDN</h1>
        <p class="subtitle">Official CDN for <b>bangla_fonts</b> Flutter Package</p>
    </header>

    <div class="font-grid" id="font-container">
        </div>

    <footer>
        Developed with <i class="fa-solid fa-heart" style="color: #ef4444;"></i> by 
        <a href="https://github.com/oxfaysal">Faysal (LoomixDev)</a>
    </footer>
</div>

<script>
    // ১. আপনার ফন্টের লিস্ট এখানে অ্যাড করুন (সহজ এবং ক্লিন)
    const fonts = [
        { name: "Kalpurush", fileName: "kalpurush.ttf", preview: "আমার সোনার বাংলা" },
        { name: "Shadhinata", fileName: "shadhinata.ttf", preview: "জয় বাংলা জয় বঙ্গবন্ধু" },
        
    ];

    const fontContainer = document.getElementById('font-container');
    const dynamicStyles = document.getElementById('dynamic-fonts');

    // ২. ম্যাজিক লজিক: ফন্ট লোড এবং মডার্ন কার্ড তৈরি
    fonts.forEach((font, index) => {
        // ফন্ট ফ্যামিলি ইনজেক্ট করা
        dynamicStyles.innerHTML += `
            @font-face {
                font-family: '${font.name}';
                src: url('fonts/${font.fileName}') format('truetype');
            }
        `;

        // কার্ড ডিজাইন
        const card = `
            <div class="font-card" style="animation-delay: ${index * 0.1}s">
                <a href="fonts/${font.fileName}" class="top-download-btn" title="Download ${font.name}" download>
                    <i class="fa-solid fa-cloud-arrow-down"></i>
                </a>
                <span class="font-name">${font.name}</span>
                <div class="preview-box">
                    <div class="font-preview" style="font-family: '${font.name}', sans-serif;">${font.preview}</div>
                </div>
                <button class="copy-btn" onclick="copyLink('fonts/${font.fileName}')">
                    <i class="fa-solid fa-link"></i> Copy CDN Link
                </button>
            </div>
        `;
        fontContainer.innerHTML += card;
    });

    // ৩. টোস্ট বা অ্যালার্ট সহ কপি ফাংশন
    function copyLink(path) {
        const url = window.location.origin + window.location.pathname;
        const fullUrl = (url.endsWith('/') ? url : url + '/') + path;
        
        navigator.clipboard.writeText(fullUrl).then(() => {
            // সুন্দর একটি টেম্পোরারি অ্যালার্ট
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
            btn.style.background = '#22c55e';
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = '#1e293b';
            }, 2000);
        });
    }
</script>

</body>
</html>
