<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla Fonts CDN - LoomixDev</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style id="dynamic-fonts"></style> 
    <style>
        :root {
            --primary: #0175C2;
            --primary-dark: #015a96;
            --accent: #7c3aed;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* --- Hero Section --- */
        .hero-section {
            text-align: center;
            padding: 60px 20px 60px;
            background: linear-gradient(135deg, #ffffff 0%, #e5e7eb 100%);
            border-radius: 0 0 40px 40px;
            box-shadow: var(--shadow-sm);
        }

        .pkg-badge {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            background: white;
            padding: 8px 16px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            transition: 0.3s;
        }

        h1 {
            font-weight: 800;
            font-size: clamp(2.2rem, 8vw, 3.2rem);
            margin: 10px 0;
            letter-spacing: -1.5px;
            color: #111827;
        }

        .hero-section p {
            color: var(--text-muted);
            font-size: clamp(1rem, 4vw, 1.1rem);
            max-width: 600px;
            margin: 0 auto 25px;
        }

        .social-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }
        
        .social-icon {
            width: 42px; height: 42px;
            background: white;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            color: var(--text-main);
            text-decoration: none;
            box-shadow: var(--shadow-sm);
            transition: 0.3s;
        }
        .social-icon:hover { transform: translateY(-3px); color: var(--primary); }

        /* --- Hero Packages Section --- */
        .hero-pkg-container {
            margin-top: 30px;
        }

        .pkg-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
            position: relative;
        }

        .projects-bar {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .project-chip {
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s ease;
            white-space: nowrap;
        }

        .project-chip.pkg {
            background: white;
            color: var(--primary);
            border: 1px solid rgba(1, 117, 194, 0.15);
            box-shadow: var(--shadow-sm);
        }

        .project-chip.pkg:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        /* --- Main Content --- */
        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }
        
        .section-title {
            font-size: 1.4rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }

        .font-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .font-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #e5e7eb;
            transition: 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .font-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-lg);
            transform: translateY(-5px);
        }

        .font-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .preview-box {
            background: #f8fafc;
            flex-grow: 1;
            min-height: 100px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid #f1f5f9;
        }

        .font-preview {
            font-size: 1.6rem;
            text-align: center;
            word-break: break-all;
        }

        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            padding: 12px 5px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        .btn-copy { background: #f1f5f9; color: var(--text-main); }
        .btn-dl { background: #1e293b; color: white; }
        .btn-dl:hover { background: var(--primary); }

        footer {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        /* --- Mobile Optimization --- */
        @media (max-width: 480px) {
            .hero-section { padding: 40px 15px 50px; }
            .font-grid { grid-template-columns: 1fr; }
            .projects-bar { gap: 8px; }
            .project-chip { font-size: 0.75rem; padding: 8px 12px; }
            .action-btns { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="hero-section">
    <a href="https://pub.dev/packages/bangla_fonts" target="_blank" class="pkg-badge">
        <img src="https://cdn.worldvectorlogo.com/logos/flutter.svg" width="16" alt="Flutter">
        <span style="margin-left: 8px; font-size: 0.7rem; font-weight: 700; color: var(--primary);">OFFICIAL FLUTTER PACKAGE</span>
    </a>

    <h1>Bangla Fonts <span style="color: var(--primary);">CDN</span></h1>
    <p>Modern Bengali Typography for Web & App Developers.</p>
    
    <div class="social-row">
        <a href="https://oxfaysal.github.io/" target="_blank" class="social-icon" title="GitHub"><i class="fab fa-github"></i></a>
        <a href="https://facebook.com/0xfaysal" target="_blank" class="social-icon" title="Facebook"><i class="fab fa-facebook"></i></a>
        <a href="mailto:loomixdev@gmail.com" class="social-icon" title="Email"><i class="fas fa-envelope"></i></a>
    </div>

    <div class="hero-pkg-container">
        <span class="pkg-label">Our Official Packages</span>
        <div class="projects-bar">
            <a href="https://pub.dev/packages/bangla_fonts" target="_blank" class="project-chip pkg">
                <i class="fas fa-font"></i> bangla_fonts
            </a>
            <a href="https://pub.dev/packages/date_snap" target="_blank" class="project-chip pkg">
                <i class="fas fa-calendar-alt"></i> date_snap
            </a>
            <a href="https://pub.dev/packages/custom_masonry_grid" target="_blank" class="project-chip pkg">
                <i class="fas fa-th-large"></i> masonry_grid
            </a>
            <a href="https://pub.dev/packages/privacy_lens" target="_blank" class="project-chip pkg">
                <i class="fas fa-shield-alt"></i> privacy_lens
            </a>
        </div>
    </div>
</div>

<div class="container">
    <div class="section-title">
        <i class="fas fa-layer-group" style="color: var(--primary);"></i> Available Fonts
    </div>
    <div class="font-grid" id="font-container"></div>
</div>

<footer>
    <div style="display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap;">
        <p style="margin: 0;">
            Developed with <i class="fa-solid fa-heart" style="color: #ef4444;"></i> by <b>Faysal (LoomixDev)</b>
        </p>
        
        <img src="https://komarev.com/ghpvc/?username=oxfaysal-fonts&color=0175C2&style=flat-square&label=VISITORS" alt="Visitors" style="height: 20px; border-radius: 3px;">
    </div>

    <div class="license-box" style="margin-top: 15px;">
        <small>© 2026 LoomixDev. All font Creators credited.</small>
    </div>
</footer>

<script>
    const fonts = [

        { name: "Adorsho Lipi", fileName: "adorsholipi.ttf", preview: "বর্ণমালার সহজ পাঠ" },
        { name: "Anek Bangla", fileName: "anekbangla.ttf", preview: "আধুনিক বাংলার রূপ" },
        { name: "Hind Siliguri", fileName: "hindsiliguri.ttf", preview: "প্রযুক্তি ও বাংলা ভাষা" },
        { name: "Kalpurush", fileName: "kalpurush.ttf", preview: "আমার সোনার বাংলা" },
        { name: "Li Adorno Irrit", fileName: "liadornoirrit.ttf", preview: "সৃজনশীল নতুন মাত্রা" },
        { name: "Li Dorswadesh", fileName: "liadorswadesh.ttf", preview: "দেশের মাটির টান" },
        { name: "Li Dhakaia", fileName: "lidhakaiyarrr.ttf", preview: "পুরান ঢাকার ঐতিহ্য" },
        { name: "Li Liakote Kota", fileName: "liliakotekota.ttf", preview: "নান্দনিক অক্ষর শৈলী" },
        { name: "Li Shamim Chitra", fileName: "lishamimchitranee.ttf", preview: "চিত্রালী ফন্টের মায়া" },
        { name: "Li Ullash", fileName: "liullashrrr.ttf", preview: "উল্লাসে ভরা নতুন দিন" },
        { name: "Mina", fileName: "mina.ttf", preview: "সহজে পড়ার যোগ্য মিনা ফন্ট" },
        { name: "Mukti", fileName: "mukti.ttf", preview: "মুক্তির গানে প্রাণ" },
        { name: "Nikosh", fileName: "nikosh.ttf", preview: "বাংলা আমাদের অহংকার" },
        { name: "Sagar", fileName: "sagar.ttf", preview: "নীল দিগন্তের ছোঁয়া" },
        { name: "Shadhinata", fileName: "shadhinata.ttf", preview: "রক্তে গড়া বাংলাদেশ" },
        { name: "Showpnocari", fileName: "showpnocari.ttf", preview: "স্বপ্নের ডানায় পথচলা" },
        { name: "Siyam Rupali", fileName: "siyamrupali.ttf", preview: "বাতাসে বহিছে প্রেম" },
        { name: "SolaimanLipi", fileName: "solaimanlipi.ttf", preview: "নির্ভুল ও পরিচ্ছন্ন অক্ষর" },
        { name: "Sylheti", fileName: "sylheti.ttf", preview: "সিলেটি ভাষার মায়া" },
        { name: "SuTonnyOMJ", fileName: "sutonnyomj.ttf", preview: "বিজয় কিবোর্ডের প্রিয় ফন্ট" }
    ];

    const fontContainer = document.getElementById('font-container');
    const dynamicStyles = document.getElementById('dynamic-fonts');

    fonts.forEach((font) => {
        dynamicStyles.innerHTML += `@font-face { font-family: '${font.name}'; src: url('fonts/${font.fileName}'); }`;

        const card = document.createElement('div');
        card.className = 'font-card';
        card.innerHTML = `
            <div class="font-info">
                <span class="font-name" style="font-weight: 700;">${font.name}</span>
                <i class="fas fa-check-circle" style="color: #10b981; font-size: 0.9rem;"></i>
            </div>
            <div class="preview-box">
                <div class="font-preview" style="font-family: '${font.name}', sans-serif;">${font.preview}</div>
            </div>
            <div class="action-btns">
                <button class="btn btn-copy" onclick="copyLink('fonts/${font.fileName}', this)">
                    <i class="far fa-copy"></i> CDN
                </button>
                <a href="fonts/${font.fileName}" class="btn btn-dl" download>
                    <i class="fas fa-download"></i> TTF
                </a>
            </div>
        `;
        fontContainer.appendChild(card);
    });

    function copyLink(path, btn) {
        const url = window.location.origin + window.location.pathname;
        const fullUrl = (url.endsWith('/') ? url : url + '/') + path;
        
        navigator.clipboard.writeText(fullUrl).then(() => {
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Copied';
            btn.style.color = "#166534";
            btn.style.backgroundColor = "#dcfce7";
            
            setTimeout(() => { 
                btn.innerHTML = original; 
                btn.style.color = "";
                btn.style.backgroundColor = "";
            }, 2000);
        });
    }
</script>

</body>
</html>
